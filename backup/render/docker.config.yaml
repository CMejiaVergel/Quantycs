# Backup de la configuración de Docker - Fecha: $(date)

# Configuración del backend
backend:
  dockerfile: |
    # Dockerfile para el backend (FastAPI)
    FROM python:3.11-slim

    # Establecer el directorio de trabajo
    WORKDIR /app

    # Copiar los archivos de dependencias
    COPY requirements.txt ./

    # Instalar dependencias
    RUN pip install --no-cache-dir -r requirements.txt

    # Copiar el código fuente del backend
    COPY app/ ./app

    # Exponer el puerto (Render usará la variable de entorno PORT)
    ENV PORT=8000
    EXPOSE $PORT

    # Comando para iniciar el backend
    CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${PORT}"]

# Configuración del frontend
frontend:
  dockerfile: |
    # Dockerfile para el frontend (estático) usando nginx
    FROM nginx:alpine

    # Copiar el archivo index.html al directorio de contenido de nginx
    COPY index.html /usr/share/nginx/html/index.html

    # Exponer el puerto (Render usará la variable de entorno PORT)
    ENV PORT=80
    EXPOSE $PORT

    # Configurar nginx para usar el puerto dinámico
    RUN echo "server { listen ${PORT}; location / { root /usr/share/nginx/html; try_files \$uri \$uri/ /index.html; } }" > /etc/nginx/conf.d/default.conf

# Configuración de docker-compose
docker-compose: |
  version: '3.8'

  services:
    backend:
      build:
        context: .
        dockerfile: Dockerfile.backend
      ports:
        - "8000:8000"
      environment:
        - PYTHONUNBUFFERED=1
      volumes:
        - ./app:/app/app

    frontend:
      build:
        context: .
        dockerfile: Dockerfile.frontend
      ports:
        - "80:80"
      depends_on:
        - backend

# Variables de entorno
envVars:
  DATABASE_URL: "sqlite:///./test.db"  # Reemplazar con la URL real de la base de datos

# Notas importantes
notes: |
  - Esta es la configuración de Docker que estábamos probando
  - Los servicios están configurados para usar Docker
  - El backend está configurado para usar FastAPI
  - El frontend está configurado para usar Nginx
  - La configuración está optimizada para Render 